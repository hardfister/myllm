spring:
  application:
    name: myllm

  datasource:
    url: jdbc:mysql://localhost:3306/myllm_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:  # 替换为你的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Spring AI: Ollama embedding + Chroma 向量存储
  ai:
    ollama:
      embedding:
        enabled: true
        model: nomic-embed-text
        base-url: http://localhost:11434
      init:
        pull-model-strategy: never
    vectorstore:
      chroma:
        initialize-schema: true
        client:
          host: http://127.0.0.1
          port: 8000
        collection-name: my_knowledge_base

  # Redis 缓存（Redis 不可用时自动降级到 MySQL 直查）
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

# JWT
app:
  jwt:
    secret: myllm-jwt-secret-key-2026-please-change-this-in-production-environment
    expiration-ms: 86400000
