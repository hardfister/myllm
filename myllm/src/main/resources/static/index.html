<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLLM - AI 聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #333;
        }
        .settings-btn {
            padding: 8px 16px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.assistant {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #007bff;
            color: #fff;
        }
        .message.assistant .message-content {
            background: #fff;
            color: #333;
            border: 1px solid #e0e0e0;
        }
        .input-container {
            background: #fff;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .input-container textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
            min-height: 50px;
            max-height: 150px;
        }
        .send-btn {
            padding: 10px 20px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .send-btn:hover {
            background: #218838;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
        }
        .modal-content h2 {
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal-buttons .cancel {
            background: #6c757d;
            color: #fff;
        }
        .modal-buttons .save {
            background: #28a745;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MyLLM</h1>
        <button class="settings-btn" onclick="openSettings()">设置</button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            <div class="message-content">你好！我是 AI 助手，有什么可以帮助你的吗？</div>
        </div>
    </div>

    <div class="input-container">
        <textarea id="userInput" placeholder="输入你的消息..." rows="2"></textarea>
        <button class="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>模型设置</h2>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入 API Key">
            </div>
            <div class="form-group">
                <label>Base URL</label>
                <input type="text" id="baseUrl" placeholder="输入 Base URL">
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="modelName" placeholder="输入模型名称">
            </div>
            <div class="modal-buttons">
                <button class="cancel" onclick="closeSettings()">取消</button>
                <button class="save" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let systemMessage = "你是一个有帮助的AI助手。";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: message,
                        systemMessage: systemMessage
                    })
                });

                const result = await response.text();
                addMessage(result, 'assistant');
            } catch (error) {
                addMessage('抱歉，发生了错误，请稍后重试。', 'assistant');
            }
        }

        function addMessage(content, type) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value;
            const baseUrl = document.getElementById('baseUrl').value;
            const modelName = document.getElementById('modelName').value;

            fetch('/api/model/switch', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    apiKey: apiKey,
                    baseUrl: baseUrl,
                    modelName: modelName
                })
            }).then(() => {
                closeSettings();
                alert('设置已保存');
            });
        }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
